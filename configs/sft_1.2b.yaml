# Supervised Fine-Tuning config for Swedish LFM2.5-1.2B-CPT
# LoRA fine-tuning on CPT checkpoint

model_name: lfm25-svenska-1.2b-cpt  # will be prefixed with HF username at runtime
output_repo: lfm25-svenska-1.2b-cpt-sft

seq_length: 4096
load_in_4bit: false

# LoRA
lora_r: 16
lora_alpha: 16
lora_dropout: 0  # Unsloth path hardcodes 0; TRL fallback reads this

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: linear
warmup_ratio: 0.03
weight_decay: 0.01
bf16: true
gradient_checkpointing: true

logging_steps: 10
save_steps: 250
eval_steps: 250
save_total_limit: 3

report_to: trackio

# Data paths (relative to repo root)
train_manifest: data/manifests/sft_train.jsonl
eval_manifest: data/manifests/sft_eval.jsonl
