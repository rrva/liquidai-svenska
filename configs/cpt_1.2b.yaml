# Continued Pretraining config for LFM2.5-1.2B on Swedish text
# Full-parameter training (NOT LoRA) using transformers.Trainer

model_name: LiquidAI/LFM2.5-1.2B-Base
output_repo: lfm25-svenska-1.2b-cpt

seq_length: 2048
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
weight_decay: 0.1
warmup_ratio: 0.01
lr_scheduler_type: cosine
num_train_epochs: 1
bf16: true
gradient_checkpointing: true

logging_steps: 10
save_steps: 500
eval_steps: 500
save_total_limit: 3

report_to: trackio

# Data paths (relative to repo root)
train_manifest: data/manifests/cpt_train.jsonl
eval_manifest: data/manifests/cpt_eval.jsonl
