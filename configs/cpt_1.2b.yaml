# Continued Pretraining config for LFM2.5-1.2B on Swedish text
# LoRA-based CPT using Unsloth's UnslothTrainer (matches official notebook)

model_name: LiquidAI/LFM2.5-1.2B-Base
output_repo: lfm25-svenska-1.2b-cpt

seq_length: 2048

# LoRA — high rank for CPT, includes embed_tokens + lm_head for language adaptation
lora_r: 128
lora_alpha: 32
lora_dropout: 0
use_rslora: true  # rank stabilized LoRA: alpha/sqrt(r) scaling

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
embedding_learning_rate: 5.0e-6  # 10x smaller for embed_tokens/lm_head
weight_decay: 0.0
warmup_ratio: 0.1
lr_scheduler_type: cosine
num_train_epochs: 1
bf16: true

logging_steps: 1
save_steps: 500
eval_steps: 500
save_total_limit: 3

report_to: trackio

# Data paths (relative to repo root)
train_manifest: data/manifests/cpt_train.jsonl
eval_manifest: data/manifests/cpt_eval.jsonl
